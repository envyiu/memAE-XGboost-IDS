experiment: host_disjoint_zdr5
binary_detection:
  objective: binary:logistic
  eval_metric: aucpr
  tree_method: hist
  n_estimators: 1500
  early_stopping_rounds: 100
  learning_rate: 0.03
  max_depth: 8
  min_child_weight: 2
  subsample: 0.85
  colsample_bytree: 0.85
  gamma: 0.1
  reg_alpha: 0.0005
  reg_lambda: 1.0
  seed: 42
training:
  max_train_samples: 600000
  max_val_samples: 150000
  family_balance: true
  max_samples_per_attack_family: 80000
  benign_to_attack_ratio: 2.5
threshold:
  metric: f1
  min: 0.01
  max: 0.99
  steps: 99
