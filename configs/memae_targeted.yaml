experiment: zero_day_dos
model:
  latent_dim: 48
  memory_size: 128
  shrink_threshold: 0.0078125
training:
  epochs: 65
  min_epochs: 8
  batch_size: 4096
  learning_rate: 0.0005
  weight_decay: 0.000001
  entropy_weight: 0.0002
  patience: 10
  lr_scheduler_factor: 0.5
  lr_scheduler_patience: 3
  min_learning_rate: 0.00001
  max_train_samples:
  max_val_samples:
  num_workers: 0
selection:
  metric: val_loss
  target_fpr: 0.01
