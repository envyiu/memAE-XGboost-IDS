experiment: host_disjoint_zdr5
binary_detection:
  objective: binary:logistic
  eval_metric: aucpr
  tree_method: hist
  device: cuda
  n_estimators: 500
  early_stopping_rounds: 100
  learning_rate: 0.03
  max_depth: 6
  min_child_weight: 5
  subsample: 0.85
  colsample_bytree: 0.85
  gamma: 0.3
  reg_alpha: 0.01
  reg_lambda: 2.0
  seed: 42
training:
  max_train_samples: 1200000
  max_val_samples: 250000
  family_balance: true
  max_samples_per_attack_family: 120000
  benign_to_attack_ratio: 2.5
  feature_selection: true
  feature_selection_threshold: 0.0
  feature_selection_repeats: 1
  feature_selection_keep_memae_scalars: true
  min_eval_attack_samples: 50
  internal_eval_fraction: 0.2
threshold:
  metric: f1
  min: 0.01
  max: 0.99
  steps: 99
