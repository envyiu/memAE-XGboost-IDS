experiment: host_disjoint_zdr5
model:
  embed_dim: 64
  depth: 4
  heads: 8
  latent_dim: 192
  ff_mult: 4
  attn_dropout: 0.1
  ff_dropout: 0.1
  classifier_dropout: 0.1
  pooling: cls_mean
training:
  epochs: 60
  min_epochs: 6
  batch_size: 1024
  eval_batch_size: 2048
  gradient_accumulation_steps: 8
  learning_rate: 0.0005
  weight_decay: 0.000001
  patience: 8
  lr_scheduler_factor: 0.5
  lr_scheduler_patience: 3
  min_learning_rate: 0.00001
  max_train_samples: 1200000
  max_val_samples: 300000
  num_workers: 2
  pin_memory: true
  data_parallel: true
  device: cuda
  amp: true
selection:
  metric: val_aucpr
